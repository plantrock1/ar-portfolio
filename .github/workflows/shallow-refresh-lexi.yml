name: Shallow Refresh — Lexi Lindstrom

on:
  workflow_dispatch:

jobs:
  shallow-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Google Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update -q
          sudo apt-get install -y /tmp/chrome.deb
          google-chrome --version

      - name: Install npm dependencies
        run: npm ci

      - name: Run shallow refresh
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_LEXI }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD_LEXI }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET_LEXI }}
          CRON_SECRET: ${{ secrets.CRON_SECRET_LEXI }}
          USE_LOCAL_CHROME: "1"
        run: npx tsx scripts/run-shallow-refresh.ts
