name: Deep Refresh

on:
  # Manual trigger — available as a "Run workflow" button in GitHub's UI
  # (Actions tab → Deep Refresh → Run workflow).
  workflow_dispatch:

  # Scheduled — every Sunday at 09:00 UTC. Adjust or delete as needed.
  # Cron times use UTC; 09:00 UTC is 05:00 ET / 02:00 PT / 10:00 BST.
  schedule:
    - cron: "0 9 * * 0"

jobs:
  deep-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Google Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update -q
          sudo apt-get install -y /tmp/chrome.deb
          google-chrome --version

      - name: Install npm dependencies
        run: npm ci

      - name: Run deep refresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          USE_LOCAL_CHROME: "1"
        run: npx tsx scripts/run-deep-refresh.ts
