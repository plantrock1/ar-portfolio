name: Deep Refresh — Chase Burke

on:
  # Manual trigger button (Actions tab → this workflow → Run workflow)
  workflow_dispatch:

  # Weekly schedule — 1 hour after Alec's so they don't collide if both share
  # any infrastructure. Adjust freely.
  schedule:
    - cron: "0 10 * * 0"

jobs:
  deep-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Google Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update -q
          sudo apt-get install -y /tmp/chrome.deb
          google-chrome --version

      - name: Install npm dependencies
        run: npm ci

      - name: Run deep refresh
        env:
          # Shared Spotify app credentials (same as Alec's — one app handles many callers)
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          # Chase-specific — each A&R has their own DB + session secrets
          DATABASE_URL: ${{ secrets.DATABASE_URL_CHASE }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD_CHASE }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET_CHASE }}
          CRON_SECRET: ${{ secrets.CRON_SECRET_CHASE }}
          USE_LOCAL_CHROME: "1"
        run: npx tsx scripts/run-deep-refresh.ts
